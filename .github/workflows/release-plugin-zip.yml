name: Release Plugin ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create/use (example: v1.2.0)"
        required: true
        type: string
      release_name:
        description: "Optional release title (defaults to tag)"
        required: false
        type: string
      prerelease:
        description: "Mark release as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Quality Checks passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          SHA="${GITHUB_SHA}"
          URL="https://api.github.com/repos/${REPO}/actions/workflows/quality-checks.yml/runs?head_sha=${SHA}&status=completed&per_page=50"

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$URL" > /tmp/quality-runs.json

          python3 - <<'PY'
          import json
          import sys

          with open('/tmp/quality-runs.json', 'r', encoding='utf-8') as fh:
              payload = json.load(fh)

          runs = payload.get('workflow_runs', [])
          if not runs:
              print('No completed Quality Checks workflow run found for this commit.')
              sys.exit(1)

          for run in runs:
              if run.get('conclusion') == 'success':
                  print('Quality Checks passed:', run.get('html_url', ''))
                  sys.exit(0)

          print('Quality Checks found for commit, but none passed.')
          for run in runs:
              print('-', run.get('conclusion'), run.get('html_url', ''))
          sys.exit(1)
          PY

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          else
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            RELEASE_NAME="${{ github.event.inputs.release_name }}"
            PRERELEASE="${{ github.event.inputs.prerelease }}"
            if [ -z "${RELEASE_NAME}" ]; then
              RELEASE_NAME="${TAG_NAME}"
            fi
          fi

          {
            echo "tag_name=${TAG_NAME}"
            echo "release_name=${RELEASE_NAME}"
            echo "prerelease=${PRERELEASE}"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push tag (workflow dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.meta.outputs.tag_name }}"

          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q .; then
            echo "Tag ${TAG_NAME} already exists on origin."
          else
            git tag "${TAG_NAME}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Build installable plugin ZIP (strict allowlist)
        run: |
          set -euo pipefail

          PLUGIN_SLUG="advanced-passkey-login"
          DIST_DIR="dist"
          BUILD_ROOT="${DIST_DIR}/${PLUGIN_SLUG}"

          rm -rf "${DIST_DIR}"
          mkdir -p "${BUILD_ROOT}"

          cp -R admin includes languages vendor "${BUILD_ROOT}/"
          cp index.php advanced-passkey-login.php readme.txt uninstall.php composer.json composer.lock "${BUILD_ROOT}/"

          # Remove hidden files (e.g. .DS_Store, .gitignore) from packaged output.
          find "${BUILD_ROOT}" -type d -name '.*' -prune -exec rm -rf {} +
          find "${BUILD_ROOT}" -type f -name '.*' -delete

          (
            cd "${DIST_DIR}"
            zip -rq "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}" -x "*.DS_Store" "__MACOSX/*"
          )

      - name: Validate packaged ZIP contents
        run: |
          set -euo pipefail

          PLUGIN_SLUG="advanced-passkey-login"
          ZIP_PATH="dist/${PLUGIN_SLUG}.zip"

          unzip -Z1 "${ZIP_PATH}" > /tmp/zip-contents.txt

          # Fail if hidden files were included.
          if grep -E '(^|/)\.[^/]+' /tmp/zip-contents.txt >/dev/null; then
            echo "Hidden path segment(s) detected in release ZIP:"
            grep -E '(^|/)\.[^/]+' /tmp/zip-contents.txt || true
            exit 1
          fi

          # Ensure all root-level entries are expected.
          awk -F/ -v slug="${PLUGIN_SLUG}" '$1==slug && NF>=2 && $2!="" {print $2}' /tmp/zip-contents.txt | sort -u > /tmp/root-entries.txt
          cat <<'EOF' | sort -u > /tmp/expected-root-entries.txt
          admin
          advanced-passkey-login.php
          composer.json
          composer.lock
          includes
          index.php
          languages
          readme.txt
          uninstall.php
          vendor
          EOF

          if ! diff -u /tmp/expected-root-entries.txt /tmp/root-entries.txt; then
            echo "Unexpected root-level files found in release ZIP."
            exit 1
          fi

      - name: Upload ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: advanced-passkey-login-release-build
          path: dist/advanced-passkey-login.zip
          if-no-files-found: error

      - name: Build release notes from readme.txt changelog
        id: notes
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.meta.outputs.tag_name }}"
          VERSION="${TAG_NAME#v}"
          NOTES_PATH="/tmp/release-notes.md"

          awk -v ver="$VERSION" '
            $0 ~ "^= " ver " =$" { in_ver=1; next }
            in_ver && $0 ~ "^= [0-9]+\\.[0-9]+\\.[0-9]+ =$" { exit }
            in_ver { print }
          ' readme.txt | sed '/^[[:space:]]*$/d' > "$NOTES_PATH"

          if [ ! -s "$NOTES_PATH" ]; then
            echo "No changelog notes found for version ${VERSION} in readme.txt"
            exit 1
          fi

          {
            echo "## Changelog (${VERSION})"
            echo
            cat "$NOTES_PATH"
          } > /tmp/release-notes-full.md

          echo "notes_path=/tmp/release-notes-full.md" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release and attach ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: dist/advanced-passkey-login.zip
