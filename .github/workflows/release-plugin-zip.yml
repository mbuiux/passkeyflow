name: Release Plugin ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create/use (example: v1.2.0)"
        required: true
        type: string
      release_name:
        description: "Optional release title (defaults to tag)"
        required: false
        type: string
      prerelease:
        description: "Mark release as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wp
          MYSQL_PASSWORD: wp
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP and WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2, wp-cli
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Install PHPCS + WPCS tooling
        run: |
          set -euo pipefail

          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --dev \
            squizlabs/php_codesniffer:^3 \
            wp-coding-standards/wpcs:^3 \
            phpcsstandards/phpcsutils:^1 \
            phpcsstandards/phpcsextra:^1 \
            --no-interaction --with-all-dependencies

          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"
          echo "$HOME/.config/composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Run PHPCS (WordPress standard)
        run: |
          set -euo pipefail
          phpcs --standard=WordPress --extensions=php --ignore='*/vendor/*,*/node_modules/*,*/dist/*' includes admin advanced-passkey-login.php

      - name: Set up clean WordPress for Plugin Check
        run: |
          set -euo pipefail

          WP_TEST_DIR="/tmp/wp-plugin-check"
          rm -rf "$WP_TEST_DIR"
          mkdir -p "$WP_TEST_DIR"
          cd "$WP_TEST_DIR"

          wp core download --allow-root
          wp config create \
            --dbname=wordpress \
            --dbuser=wp \
            --dbpass=wp \
            --dbhost=127.0.0.1:3306 \
            --skip-check \
            --allow-root

          for i in {1..30}; do
            if wp db check --allow-root >/dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Timed out waiting for MySQL readiness"
              exit 1
            fi
            sleep 2
          done

          wp core install \
            --url=http://localhost \
            --title="Plugin Check CI" \
            --admin_user=admin \
            --admin_password=admin \
            --admin_email=admin@example.com \
            --skip-email \
            --allow-root

          ln -s "$GITHUB_WORKSPACE" "$WP_TEST_DIR/wp-content/plugins/advanced-passkey-login"
          wp plugin install plugin-check --activate --allow-root

      - name: Run Plugin Check
        run: |
          set -euo pipefail

          WP_TEST_DIR="/tmp/wp-plugin-check"
          cd "$WP_TEST_DIR"

          wp plugin check advanced-passkey-login \
            --exclude-directories=dist,.github \
            --exclude-files=.gitignore,.DS_Store \
            --format=strict-json \
            --allow-root > /tmp/plugin-check-results.json

          php -r '
          $rows = json_decode(file_get_contents("/tmp/plugin-check-results.json"), true);
          if (!is_array($rows)) {
              fwrite(STDERR, "Plugin Check did not return valid JSON.\n");
              exit(2);
          }
          $errors = 0;
          $warnings = 0;
          foreach ($rows as $row) {
              $type = strtolower((string)($row["type"] ?? ""));
              if ($type === "error") {
                  $errors++;
              } elseif ($type === "warning") {
                  $warnings++;
              }
          }
          echo "Plugin Check errors: {$errors}\n";
          echo "Plugin Check warnings: {$warnings}\n";
          if ($errors > 0 || $warnings > 0) {
              exit(1);
          }
          '

  build-and-attach:
    needs: quality-gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          else
            TAG_NAME="${{ inputs.tag_name }}"
            RELEASE_NAME="${{ inputs.release_name }}"
            PRERELEASE="${{ inputs.prerelease }}"
            if [ -z "${RELEASE_NAME}" ]; then
              RELEASE_NAME="${TAG_NAME}"
            fi
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag (workflow dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.meta.outputs.tag_name }}"

          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q .; then
            echo "Tag ${TAG_NAME} already exists on origin."
          else
            git tag "${TAG_NAME}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Build installable plugin ZIP (strict allowlist)
        run: |
          set -euo pipefail

          PLUGIN_SLUG="advanced-passkey-login"
          DIST_DIR="dist"
          BUILD_ROOT="${DIST_DIR}/${PLUGIN_SLUG}"

          rm -rf "${DIST_DIR}"
          mkdir -p "${BUILD_ROOT}"

          cp -R admin includes languages vendor "${BUILD_ROOT}/"
          cp index.php advanced-passkey-login.php readme.txt uninstall.php composer.json composer.lock "${BUILD_ROOT}/"

          # Remove hidden files (e.g. .DS_Store, .gitignore) from packaged output.
          find "${BUILD_ROOT}" -type d -name '.*' -prune -exec rm -rf {} +
          find "${BUILD_ROOT}" -type f -name '.*' -delete

          (
            cd "${DIST_DIR}"
            zip -rq "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}" -x "*.DS_Store" "__MACOSX/*"
          )

      - name: Validate packaged ZIP contents
        run: |
          set -euo pipefail

          PLUGIN_SLUG="advanced-passkey-login"
          ZIP_PATH="dist/${PLUGIN_SLUG}.zip"

          unzip -Z1 "${ZIP_PATH}" > /tmp/zip-contents.txt

          # Fail if hidden files were included.
          if grep -E '(^|/)\.[^/]+' /tmp/zip-contents.txt >/dev/null; then
            echo "Hidden path segment(s) detected in release ZIP:"
            grep -E '(^|/)\.[^/]+' /tmp/zip-contents.txt || true
            exit 1
          fi

          # Ensure all root-level entries are expected.
          awk -F/ -v slug="${PLUGIN_SLUG}" '$1==slug && NF>=2 && $2!="" {print $2}' /tmp/zip-contents.txt | sort -u > /tmp/root-entries.txt
          cat <<'EOF' | sort -u > /tmp/expected-root-entries.txt
          admin
          advanced-passkey-login.php
          composer.json
          composer.lock
          includes
          index.php
          languages
          readme.txt
          uninstall.php
          vendor
          EOF

          if ! diff -u /tmp/expected-root-entries.txt /tmp/root-entries.txt; then
            echo "Unexpected root-level files found in release ZIP."
            exit 1
          fi

      - name: Upload ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: advanced-passkey-login-release-build
          path: dist/advanced-passkey-login.zip
          if-no-files-found: error

      - name: Build release notes from readme.txt changelog
        id: notes
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.meta.outputs.tag_name }}"
          VERSION="${TAG_NAME#v}"
          NOTES_PATH="/tmp/release-notes.md"

          awk -v ver="$VERSION" '
            $0 ~ "^= " ver " =$" { in_ver=1; next }
            in_ver && $0 ~ "^= [0-9]+\\.[0-9]+\\.[0-9]+ =$" { exit }
            in_ver { print }
          ' readme.txt | sed '/^[[:space:]]*$/d' > "$NOTES_PATH"

          if [ ! -s "$NOTES_PATH" ]; then
            echo "No changelog notes found for version ${VERSION} in readme.txt"
            exit 1
          fi

          {
            echo "## Changelog (${VERSION})"
            echo
            cat "$NOTES_PATH"
          } > /tmp/release-notes-full.md

          echo "notes_path=/tmp/release-notes-full.md" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release and attach ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: dist/advanced-passkey-login.zip
